user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

stream {
    upstream stream_https_backend {
        server 127.0.0.1:4443;
    }

    upstream stream_hy2_backend {
        server s-ui:28888;
    }

    upstream stream_vless_backend {
        server s-ui:28889;
    }

    map $ssl_preread_server_name $stream_backend {
        panel.sokolrock.org stream_https_backend;
        sokolrock.org stream_https_backend;
        www.sokolrock.org stream_https_backend;
        hy2.sokolrock.org stream_hy2_backend;
        vless.sokolrock.org stream_vless_backend;
        default stream_https_backend;
    }

    server {
        listen 443;
        listen [::]:443;
        proxy_pass $stream_backend;
        ssl_preread on;
    }

    server {
        listen 443 udp;
        listen [::]:443 udp;
        proxy_pass stream_hy2_backend;
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;

    server_tokens off;
    autoindex off;

    client_max_body_size 20m;
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    include /etc/nginx/conf.d/*.conf;
}
